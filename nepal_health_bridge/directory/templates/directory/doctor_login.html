<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Login - Nepal Health Bridge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #0056b3;
            --primary-hover: #004494;
            --bg-light: #f8f9fa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(240, 244, 248, 0.9), rgba(240, 244, 248, 0.9)),
                url('https://images.unsplash.com/photo-1551076805-e1869033e561?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.5s ease-out forwards;
        }

        .login-header {
            background-color: var(--primary-color);
            color: white;
            padding: 40px 30px 30px;
            text-align: center;
            position: relative;
        }

        .login-header::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 0;
            width: 100%;
            height: 40px;
            background: white;
            clip-path: polygon(0 50%, 100% 0, 100% 100%, 0 100%);
        }

        .avatar-circle {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 15px;
            border: 3px solid rgba(255, 255, 255, 0.5);
        }

        .login-title {
            font-weight: 700;
            margin: 0;
            font-size: 1.8rem;
        }

        .login-body {
            padding: 30px 40px 40px;
        }

        .form-floating>label {
            color: #6c757d;
        }

        .form-control {
            border-radius: 10px;
            border: 1px solid #dee2e6;
            padding: 1rem 0.75rem;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(0, 86, 179, 0.2);
        }

        .btn-login {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-weight: 700;
            font-size: 1.1rem;
            width: 100%;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-login:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 86, 179, 0.3);
            color: white;
        }

        .btn-back {
            text-align: center;
            display: block;
            margin-top: 20px;
            color: #6c757d;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .btn-back:hover {
            color: var(--primary-color);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    {% include 'directory/global_ui.html' %}
</head>

<body>
    <div class="container d-flex justify-content-center">
        <div class="login-card">

            <!-- Header -->
            <div class="login-header">
                <div class="avatar-circle">
                    <i class="fa-solid fa-stethoscope"></i>
                </div>
                <h2 class="login-title">Doctor Portal</h2>
            </div>

            <!-- Form Body -->
            <div class="login-body">

                <!-- ✅ Django error messages -->
                {% if messages %}
                {% for message in messages %}
                <div class="alert {% if message.tags == 'success' %}alert-success{% else %}alert-danger{% endif %} d-flex align-items-center mb-3" role="alert">
                    <i class="fa-solid {% if message.tags == 'success' %}fa-circle-check{% else %}fa-circle-xmark{% endif %} me-2"></i>
                    {{ message }}
                </div>
                {% endfor %}
                {% endif %}

                <!-- ✅ action points to doctor_login url -->
                <form method="POST" action="{% url 'doctor_login' %}" autocomplete="off">
                    {% csrf_token %}

                    <!-- ✅ name="doctor_id" is what views.py reads -->
                    <div class="form-floating mb-4">
                        <input type="text" class="form-control" id="doctorId" name="doctor_id" placeholder="Enter ID"
                            value="" required>
                        <label for="doctorId">
                            <i class="fa-regular fa-id-badge me-2"></i>Medical Unique ID
                        </label>
                    </div>

                    <div class="mb-4 position-relative">
                        <div class="input-group">
                            <div class="form-floating flex-grow-1">
                                <input type="password" class="form-control border-end-0"
                                    style="border-top-right-radius: 0; border-bottom-right-radius: 0;"
                                    id="doctorPassword" name="password" placeholder="Enter Password" value="" required>
                                <label for="doctorPassword"><i class="fa-solid fa-lock me-2"></i>Password</label>
                            </div>
                            <button class="btn btn-outline-secondary bg-white border-start-0" type="button"
                                style="border-color: #dee2e6; border-top-right-radius: 10px; border-bottom-right-radius: 10px;"
                                id="toggleDoctorPassword">
                                <i class="fa-regular fa-eye" id="toggleDoctorIcon"></i>
                            </button>
                        </div>
                        <script>
                            document.getElementById('toggleDoctorPassword').addEventListener('click', function (e) {
                                const passwordInput = document.getElementById('doctorPassword');
                                const icon = document.getElementById('toggleDoctorIcon');
                                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                                passwordInput.setAttribute('type', type);
                                icon.classList.toggle('fa-eye');
                                icon.classList.toggle('fa-eye-slash');
                            });
                        </script>
                    </div>

                    <button type="submit" class="btn btn-login">
                        Secure Login <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i>
                    </button>

                    <a href="{% url 'hospital_login' %}" class="btn-back">
                        <i class="fa-solid fa-arrow-left me-1"></i> Back to Portal Select
                    </a>
                </form>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
