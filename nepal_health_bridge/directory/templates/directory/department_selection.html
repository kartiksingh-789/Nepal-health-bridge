<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Department - Nepal Health Bridge</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #0056b3;
            --primary-hover: #004494;
            --bg-light: #f4f7f6;
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            padding-bottom: 50px;
        }

        .page-header {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            color: white;
            padding: 40px 0 60px;
            margin-bottom: -30px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .btn-back {
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            transform: translateX(-5px);
        }

        /* Dept Cards */
        .dept-card {
            background: white;
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
            border: 2px solid transparent;
        }

        .dept-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            border-color: rgba(0, 86, 179, 0.1);
        }

        .dept-icon {
            width: 80px;
            height: 80px;
            background-color: rgba(0, 86, 179, 0.05);
            color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 20px;
            transition: all 0.3s ease;
        }

        .dept-card:hover .dept-icon {
            background-color: var(--primary-color);
            color: white;
            transform: scale(1.1);
        }

        .dept-title {
            font-weight: 700;
            font-size: 1.25rem;
            margin-bottom: 15px;
        }

        .btn-view {
            background-color: white;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: 600;
            text-decoration: none;
            margin-top: auto;
            transition: all 0.3s;
        }

        .btn-view:hover {
            background-color: var(--primary-color);
            color: white;
        }
    </style>
    {% include 'directory/global_ui.html' %}
</head>

<body>

    <div class="page-header">
        <div class="container">
            <a href="/patient/select-hospital/" class="btn-back">
                <i class="fa-solid fa-arrow-left"></i> Back to Hospitals
            </a>
            <h2 class="fw-bold mb-0">Select a Department</h2>
            <p class="opacity-75">{{ hospital.name|default:"Nepal Health Bridge" }}</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container mt-5">
        <div class="row g-4 justify-content-center">

            {% for department in departments %}
            <div class="col-sm-6 col-lg-3">
                <div class="dept-card">
                    <div class="dept-icon"><i class="fa-solid fa-notes-medical"></i></div>
                    <h4 class="dept-title">{{ department.name }}</h4>
                    <a href="{% url 'select_doctor' %}?department_id={{ department.id }}" class="btn-view">View
                        Doctors</a>
                </div>
            </div>
            {% empty %}
            <div class="col-12 text-center py-5">
                <p class="text-muted">No departments currently available.</p>
            </div>
            {% endfor %}

        </div>
    </div>

</body>

</html>
